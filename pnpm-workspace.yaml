packages:
  - 'apps/*'
  - 'packages/*'
# TRACKED, reviewed advisories the `pnpm audit --audit-level high` gate tolerates
# for now. xlsx/SheetJS has NO npm fix (moved off npm); the rest are fixable via a
# deliberate dependency-update pass (multer/nodemailer are major bumps needing
# re-test). Remove an id once its dep is updated; re-review each release.
auditConfig:
  ignoreGhsas:
    - GHSA-4r6h-8v6p-xvw6 # xlsx — prototype pollution (no npm fix)
    - GHSA-5pgg-2g8v-p4x9 # xlsx — ReDoS (no npm fix)
    - GHSA-hmw2-7cc7-3qxx # form-data — CRLF (fix: >=4.0.6)
    - GHSA-72gw-mp4g-v24j # multer — DoS (fix: >=2.2.0, major)
    - GHSA-rcmh-qjqh-p98v # nodemailer — raw bypass (fix: >=7.0.11, major)
    - GHSA-p6gq-j5cr-w38f # nodemailer — addressparser DoS (fix: >=9.0.1, major)
    - GHSA-fx2h-pf6j-xcff # vite — fs.deny bypass (dev; fix: >=6.4.3)
    - GHSA-5xrq-8626-4rwp # vitest — UI server file read (dev; fix: >=3.2.6)
# Force-patch transitive deps that have published fixes (a real patch beats an
# ignoreGhsas allowlist entry). brace-expansion: GHSA-3jxr-9vmj-r5cp DoS — all
# three affected major lines have in-range patches; pulled deep via exceljs /
# @nestjs/cli / typescript-eslint glob chains.
overrides:
  'brace-expansion@<1.1.16': '1.1.16'
  'brace-expansion@>=2.0.0 <2.1.2': '2.1.2'
  'brace-expansion@>=3.0.0 <5.0.7': '5.0.7'
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
