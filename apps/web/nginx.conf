server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip static assets
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/x-javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Proxy API calls to the api service (compose network name `api`). The axios
  # client uses '/api' as its base; the trailing slash on proxy_pass strips it.
  location /api/ {
    proxy_pass http://api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
