# ─────────────────────────────────────────────────────────────────────────────
# finrep — LOCAL DEV stack: postgres + api (+ optional web behind the `web`
# profile). Reads .env (copy from .env.example). Bring up:
#   docker compose up -d --build
# Tear down:
#   docker compose down            (add -v to drop the pgdata volume)
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finrep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finrep_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-finrep}
    # Host 5434 -> container 5432 (5433 is used by smartbot).
    ports:
      - "5434:5432"
    volumes:
      - finrep_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finrep} -d ${POSTGRES_DB:-finrep}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finrep_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Talk to the postgres SERVICE on the internal port 5432 (overrides .env).
      DATABASE_URL: postgresql://${POSTGRES_USER:-finrep}:${POSTGRES_PASSWORD:-finrep_dev_pw}@postgres:5432/${POSTGRES_DB:-finrep}?schema=public
      # The prod image runs NODE_ENV=production, and bootstrap-env.ts would then
      # force sslmode=require — but this local Postgres has no TLS. Disable it so a
      # freshly-built prod image also boots against local dev (P1011 otherwise).
      DATABASE_SSLMODE: disable
      PORT: "8000"
      # Platform super-admin console. ADMIN_EMAILS grants console access to listed
      # emails; SUPERADMIN_USERNAME/PASSWORD provisions a username-based bootstrap
      # admin on boot (reached via the hidden landing easter egg → /admin/login).
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-tmunroe1}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-Teero05m??}
      # In-app support form recipient (defaults to support@ourkyro.com in config).
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@ourkyro.com}
      # Phase 4 Knowledge document store — S3 config passed through from the host .env
      # via dollar-brace substitution ONLY (no literal secret values in this file).
      # An unset host var resolves empty => isConfigured()=false => upload/download 503;
      # the app still boots and the list endpoint still works.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_DOCUMENTS_BUCKET: ${S3_DOCUMENTS_BUCKET:-}
      S3_DOCUMENTS_PREFIX: ${S3_DOCUMENTS_PREFIX:-finrep/documents}
      S3_DOCUMENTS_URL_TTL: ${S3_DOCUMENTS_URL_TTL:-604800}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - finrep_network

  # Optional — `docker compose --profile web up -d --build`
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    profiles:
      - web
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - finrep_network

volumes:
  finrep_pgdata:

networks:
  finrep_network:
