# ─────────────────────────────────────────────────────────────────────────────
# Security — SHIFT-LEFT + continuous.
#
# Shift-left: every job runs on PRs and pushes, so vulns/secrets/IaC-misconfigs
# are caught BEFORE merge (make these required checks in branch protection).
# Continuous: a nightly CRON re-scans main so newly-disclosed CVEs in already-
# merged dependencies surface even with no code change.
# Fail-fast: each scanner exits non-zero on HIGH/CRITICAL findings, failing the
# run; matrices use fail-fast, and concurrency cancels superseded runs.
#
# Tune accepted risks with allowlists: .gitleaks.toml, .trivyignore (do NOT blanket
# lower the thresholds — file specific, reviewed exceptions).
# ─────────────────────────────────────────────────────────────────────────────
name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # daily 06:00 UTC — continuous scan of the default branch
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # upload SARIF to the Security tab (CodeQL, Trivy)

jobs:
  # ── Secret scanning ────────────────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --redact --verbose --exit-code=1

  # ── Dependency vulnerabilities ─────────────────────────────────────────────
  dependencies:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (fail on high)
        run: pnpm audit --audit-level high
      - name: Trivy filesystem (vulns + secrets + misconfig)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  # ── Infrastructure-as-Code (Terraform) ─────────────────────────────────────
  iac:
    name: IaC scan (Terraform)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config (Terraform + Dockerfiles)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

  # ── Static analysis (SAST) ─────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: true
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
